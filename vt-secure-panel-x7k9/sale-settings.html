<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sale Settings - Vision Trennds Admin</title>
    <link rel="icon" type="image/png" href="../Frontend/product/color_logo.png">
    <link rel="shortcut icon" type="image/png" href="../Frontend/product/color_logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .toggle-switch { display: flex; align-items: center; gap: 10px; }
        .toggle-switch input { width: auto; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2>VISION TRENNDS</h2>
            <p>Admin Panel</p>
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="categories.html"><i class="fas fa-tags"></i> Categories</a></li>
            <li><a href="stock-management.html"><i class="fas fa-warehouse"></i> Stock Management</a></li>
            <li><a href="add-product.html"><i class="fas fa-plus"></i> Add Product</a></li>
            <li><a href="offer-management.html"><i class="fas fa-percent"></i> Offer Management</a></li>
            <li><a href="sale-settings.html" class="active"><i class="fas fa-tags"></i> Sale Banner</a></li>
        </ul>
        <div id="user-info" style="padding: 20px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: auto;"></div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>Site-Wide Sale Banner Announcement</h1>
        </div>

        <div class="form-container" style="background: white; padding: 20px; border-radius: 8px; max-width: 600px;">
            <div id="status-message" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px;"></div>
            
            <form id="sale-form">
                <div class="form-group toggle-switch">
                    <input type="checkbox" id="sale-active">
                    <label for="sale-active" style="margin: 0;">Enable Site-Wide Announcement Banner</label>
                </div>

                <div class="form-group">
                    <label for="banner-text">Announcement Banner Text</label>
                    <input type="text" id="banner-text" placeholder="e.g. SALE IS LIVE 1 july se 7 july tak!" required>
                </div>

                <button type="submit" class="btn btn-primary" id="save-btn">Save Settings</button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="admin-mobile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('sale-form');
            const statusMessage = document.getElementById('status-message');
            const saveBtn = document.getElementById('save-btn');

            function showStatus(message, isError = false) {
                statusMessage.style.display = 'block';
                statusMessage.textContent = message;
                statusMessage.style.backgroundColor = isError ? '#ffebee' : '#e8f5e9';
                statusMessage.style.color = isError ? '#c62828' : '#2e7d32';
                setTimeout(() => statusMessage.style.display = 'none', 3000);
            }

            // Load existing settings
            try {
                const response = await fetch(`${API_URL}/settings/sale`);
                if (response.ok) {
                    const settings = await response.json();
                    document.getElementById('sale-active').checked = settings.active || false;
                    document.getElementById('banner-text').value = settings.bannerText || '';
                }
            } catch (error) {
                showStatus('Failed to load settings.', true);
            }

            // Save settings
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                const newSettings = {
                    active: document.getElementById('sale-active').checked,
                    bannerText: document.getElementById('banner-text').value
                };

                try {
                    const response = await fetch(`${API_URL}/settings/sale`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(newSettings)
                    });

                    if (response.ok) {
                        showStatus('Settings saved successfully!');
                    } else {
                        showStatus('Failed to save settings.', true);
                    }
                } catch (error) {
                    showStatus('Error saving settings.', true);
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Settings';
                }
            });
        });
    </script>
</body>
</html>
